name: Code scanning / SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Note: Lukka actions must use hardcoded commit SHAs in the 'uses:' field
# because GitHub Actions requires literal strings for action resolution at parse time.

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNTIME_TOKEN: ${{ secrets.ACTIONS_RUNTIME_TOKEN }}
      ACTIONS_CACHE_URL: ${{ secrets.ACTIONS_CACHE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get vcpkg commit ID
        id: vcpkg-step
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkgGitCommitId=$vcpkgCommitId" >> $GITHUB_OUTPUT

      - name: Validate vcpkg baseline SHA
        run: |
          SHAS="${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}"
          if [ -z "${SHAS}" ]; then
            echo "::error title=Missing vcpkg baseline::Provide a full 40-char vcpkgGitCommitId."
            exit 1
          fi
          if ! echo "${SHAS}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error title=Invalid vcpkg baseline::vcpkgGitCommitId must be a full 40-char commit SHA."
            exit 1
          fi

      - name: Compute vcpkg.json hash
        id: hash
        shell: pwsh
        run: |
          $json = Get-Content "vcpkg.json" -Raw -Encoding UTF8
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $hashBytes = $sha256.ComputeHash($bytes)
          $hash = [BitConverter]::ToString($hashBytes) -replace '-', ''
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build gcc g++ libx11-dev libglew-dev

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg/archives
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/buildtrees
          key: vcpkg-sonarcloud-${{ steps.hash.outputs.hash }}
          restore-keys: |
            vcpkg-sonarcloud-

      - name: Setup vcpkg with baseline
        uses: lukka/run-vcpkg@b3dd708d38df5c856fe1c18dc0d59ab771f93921
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-step.outputs.vcpkgGitCommitId }}

      - name: Setup CMake
        uses: lukka/get-cmake@56d043d188c3612951d8755da8f4b709ec951ad6

      # Safe build only for trusted sources
      - name: Build safely
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++
          cmake --build build --parallel

      # Skip unsafe build on fork PRs
      - name: Skip unsafe build on fork PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Skipping build on fork PR to avoid executing untrusted code."

      # NOTE: SonarCloud scan requires configuration:
      # 1. Create a project on https://sonarcloud.io/
      # 2. Replace 'myproject_key' with your SonarCloud project key
      # 3. Replace 'myorganization' with your SonarCloud organization key
      # 4. Add SONAR_TOKEN secret to your repository settings
      # 5. Uncomment the step below
      # - name: SonarCloud Scan
      #   if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      #   uses: SonarSource/sonarcloud-github-action@4b4d7634dab97dcee0b75763a54a6dc92a9e6bc1
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   with:
      #     args: >
      #       -Dsonar.projectKey=myproject_key
      #       -Dsonar.organization=myorganization
